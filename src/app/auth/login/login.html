<div class="login-bg">

  <!-- ANIMAÇÃO -->
  <div class="particles"></div>

  <!-- CARD -->
  <div class="login-card">

    <!-- LOGO -->
    <img src="imagens/logo/logo-emembros.png" class="logo" />

    <h2 class="subtitle">
      Gestão inteligente para igrejas
    </h2>

    <!-- FORM -->
    <div class="form">

      <!-- EMAIL -->
      <div class="input-group">
        <i class="pi pi-envelope icon-left"></i>
        <input
          pInputText
          type="text"
          placeholder="E-mail ou Usuário"
        />
      </div>

      <!-- SENHA -->
      <div class="input-group">
        <i class="pi pi-lock icon-left"></i>

        <input
          pInputText
          [type]="passwordVisible ? 'text' : 'password'"
          placeholder="Senha"
        />

        <i
          class="pi icon-right"
          [ngClass]="passwordVisible ? 'pi-eye' : 'pi-eye-slash'"
          (click)="togglePassword()"
        ></i>
      </div>

      <!-- BOTÃO -->
      <button
        pButton
        label="Entrar"
        class="btn-login"
      ></button>

    </div>

    <!-- LINKS -->
    <div class="links">
      <a>Esqueci minha senha</a>
      <a>Criar conta</a>
    </div>

  </div>

</div>
