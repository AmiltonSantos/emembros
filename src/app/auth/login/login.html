<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-blue-700 to-cyan-500 p-4">

  <div class="w-full max-w-md">

    <!-- CARD -->
    <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-8">

      <!-- LOGO -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-blue-700 tracking-wide">
          eMembros
        </h1>
        <p class="text-gray-500 text-sm mt-1">
          Gestão inteligente para igrejas
        </p>
      </div>

      <!-- FORM -->
      <div class="space-y-4">

        <div>
          <label class="text-sm text-gray-600">E-mail</label>

          <span class="p-input-icon-left w-full mt-1">
            <i class="pi pi-envelope"></i>
            <input
              pInputText
              type="email"
              placeholder="seu@email.com"
              class="w-full"
            />
          </span>
        </div>

        <div>
          <label class="text-sm text-gray-600">Senha</label>

          <span class="p-input-icon-left w-full mt-1">
            <i class="pi pi-lock"></i>
            <input
              pInputText
              type="password"
              placeholder="••••••••"
              class="w-full"
            />
          </span>
        </div>

        <!-- BOTÃO -->
        <button
          pButton
          label="Entrar"
          class="w-full p-button-lg mt-4"
        ></button>

      </div>

      <!-- LINKS -->
      <div class="text-center mt-6 text-sm">
        <a class="text-blue-600 cursor-pointer hover:underline">
          Esqueceu a senha?
        </a>
      </div>

      <div class="text-center mt-3 text-sm text-gray-500">
        Não tem conta?
        <a class="text-blue-600 font-semibold cursor-pointer hover:underline">
          Cadastre-se
        </a>
      </div>

    </div>

    <!-- FOOTER -->
    <div class="text-center mt-6 text-xs text-white/80">
      © 2026 eMembros • Todos os direitos reservados
    </div>

  </div>

</div>
